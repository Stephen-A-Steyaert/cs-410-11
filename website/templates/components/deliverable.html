{% macro deliverable(title, image_path) %}
<div class="d-flex justify-content-center">
    <figure class="text-center m-0" style="width: 100%;">
        <picture>
            <source srcset="{{ url_for('static', filename=image_path.replace('.png', '.webp').replace('.jpg', '.webp').replace('.PNG', '.webp')) }}" type="image/webp">
            <img
                src="{{url_for('static', filename=image_path) }}"
                alt="{{ title }}"
                class="img-fluid rounded shadow-sm"
                loading="lazy"
            />
        </picture>
    </figure>
</div>
{% endmacro %}
